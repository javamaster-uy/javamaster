const EXERCISES = [
  {
    id:1, title:"Pregunta 1", points:1.0, penaltySystem:"10, 20, ...",
    description:`Escribe una función en Java llamada <code>esNegativo</code> que tome un número entero como parámetro y devuelva <code>true</code> si el número es negativo y <code>false</code> si no lo es.`,

    defaultCode:`public static boolean esNegativo(int numero) {\n    \n}`,
    tests:[

      { call:`int valor = 8;\nboolean resultado = esNegativo(valor);\nif (resultado) {\n    System.out.println(valor + " es negativo.");\n} else {\n    System.out.println(valor + " no es negativo.");\n}`, expectedOutput:"8 no es negativo." },
      { call:`int valor = 0;\nboolean resultado = esNegativo(valor);\nif (resultado) {\n    System.out.println(valor + " es negativo.");\n} else {\n    System.out.println(valor + " no es negativo.");\n}`, expectedOutput:"0 no es negativo." },

  {

    description:`Escribe una función en Java llamada <code>calcularCubo</code> que tome un número entero como parámetro y devuelva el cubo de ese número (número elevado a la 3).`,

    defaultCode:`public static int calcularCubo(int numero) {\n    \n}`,

    description:`Escribe una función en Java llamada <code>sumarDigitos</code> que tome un número entero positivo como parámetro y devuelva la suma de sus dígitos.<br/><br/>
<strong>Ejemplo:</strong> 1234 → 1+2+3+4 = 10.<br/>

⚠️ Repetí mientras el número sea mayor a 0.`,
    signature:`public static int sumarDigitos(int numero) {\n    // Tu código aquí\n}`,
    defaultCode:`public static int sumarDigitos(int numero) {\n    \n}`,
    tests:[
      { call:`int valor = 1234;\nint resultado = sumarDigitos(valor);\nSystem.out.println("La suma de dígitos de " + valor + " es: " + resultado);`, expectedOutput:"La suma de dígitos de 1234 es: 10" },

    ]

  {
    id:4, title:"Pregunta 4", points:1.0, penaltySystem:"10, 20, ...",
    description:`Escribe una función en Java llamada <code>esBisiesto</code> que tome un número entero (año) como parámetro y devuelva <code>true</code> si el año es bisiesto y <code>false</code> si no lo es.<br/><br/>
Un año es bisiesto si:<br/>
• Es divisible por 4 <strong>Y</strong> no es divisible por 100, <strong>O</strong><br/>
• Es divisible por 400.`,
    signature:`public static boolean esBisiesto(int anio) {\n    // Tu código aquí\n}`,
    defaultCode:`public static boolean esBisiesto(int anio) {\n    \n}`,
    tests:[
      { call:`int anio = 2024;\nboolean resultado = esBisiesto(anio);\nif (resultado) {\n    System.out.println(anio + " es bisiesto.");\n} else {\n    System.out.println(anio + " no es bisiesto.");\n}`, expectedOutput:"2024 es bisiesto." },
      { call:`int anio = 1900;\nboolean resultado = esBisiesto(anio);\nif (resultado) {\n    System.out.println(anio + " es bisiesto.");\n} else {\n    System.out.println(anio + " no es bisiesto.");\n}`, expectedOutput:"1900 no es bisiesto." },
      { call:`int anio = 2000;\nboolean resultado = esBisiesto(anio);\nif (resultado) {\n    System.out.println(anio + " es bisiesto.");\n} else {\n    System.out.println(anio + " no es bisiesto.");\n}`, expectedOutput:"2000 es bisiesto." },

Fórmula: <strong>Área = base × altura</strong>.`,
    signature:`public static double calcularAreaRectangulo(int base, int altura) {\n    // Tu código aquí\n}`,
    defaultCode:`public static double calcularAreaRectangulo(int base, int altura) {\n    \n}`,
    tests:[
      { call:`int base = 5, altura = 3;\ndouble resultado = calcularAreaRectangulo(base, altura);\nSystem.out.println("El área del rectángulo de base " + base + " y altura " + altura + " es: " + resultado);`, expectedOutput:"El área del rectángulo de base 5 y altura 3 es: 15.0" },
      { call:`int base = 10, altura = 4;\ndouble resultado = calcularAreaRectangulo(base, altura);\nSystem.out.println("El área del rectángulo de base " + base + " y altura " + altura + " es: " + resultado);`, expectedOutput:"El área del rectángulo de base 10 y altura 4 es: 40.0" },
    ]

  {

    description:`Escribe una función en Java llamada <code>mayorDeTres</code> que tome tres números enteros como parámetros (<strong>a</strong>, <strong>b</strong> y <strong>c</strong>) y devuelva el mayor de los tres.<br/><br/>
⚠️ No uses <code>Math.max()</code>, implementá la lógica con <code>if/else</code>.`,
    signature:`public static int mayorDeTres(int a, int b, int c) {\n    // Tu código aquí\n}`,
    defaultCode:`public static int mayorDeTres(int a, int b, int c) {\n    \n}`,
    tests:[
      { call:`int resultado = mayorDeTres(3, 7, 5);\nSystem.out.println("El mayor es: " + resultado);`, expectedOutput:"El mayor es: 7" },
      { call:`int resultado = mayorDeTres(10, 2, 8);\nSystem.out.println("El mayor es: " + resultado);`, expectedOutput:"El mayor es: 10" },
      { call:`int resultado = mayorDeTres(1, 1, 1);\nSystem.out.println("El mayor es: " + resultado);`, expectedOutput:"El mayor es: 1" },
    ]

const PENALTY_STEPS=[0,10,20,30,40,50];
const TOTAL_TIME=2*60*60;
let timeLeft=TOTAL_TIME;
let cur=0;
let codes=EXERCISES.map(e=>e.defaultCode);
let penalties=EXERCISES.map(()=>0);
let results=EXERCISES.map(()=>null);
let feedbacks=EXERCISES.map(()=>null);
let locked=EXERCISES.map(()=>false);
let history=EXERCISES.map(()=>[]);
let checking=false;
let timerInterval=null;

const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const fmtDate=()=>{const d=new Date();return d.toLocaleDateString("es-UY",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+", "+d.toLocaleTimeString("es-UY",{hour:"2-digit",minute:"2-digit"});};

function getTotal(){
  return EXERCISES.reduce((a,e,i)=>results[i]?.passed?a+(e.points*(1-penalties[i]/100)):a,0);
}

async function evaluateJavaWithAI(userCode, exercise) {
  const testBlock = exercise.tests.map((t,i)=>
    `Test ${i+1}:\n  Code: ${t.call.replace(/\n/g," ")}\n  Expected stdout: "${t.expectedOutput}"`
  ).join("\n\n");
  const prompt = `You are simulating the Moodle CodeRunner Java plugin (javac + java).
The student wrote only the body of this method:
${exercise.signature.replace(/\n/g," ")}
STUDENT CODE:
${userCode}
The test harness wraps it in a class and runs:
${testBlock}
If compile error: set compilable=false, syntaxErrors = real javac messages like "__tester__.java:3: error: ..."
If compiles: trace execution carefully and report exact stdout for each test.
For logicErrors use real CodeRunner English style: "Wrong answer: expected <X> but got <Y>"
Respond ONLY with JSON (no markdown):
{"compilable":true,"syntaxErrors":[],"tests":[{"pass":true,"gotOutput":"..."}],"logicErrors":[]}`;
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})
  });
  const data=await r.json();
  const text=data.content.map(b=>b.text||"").join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function highlightJava(code){
  return code.split("\n").map(line=>{
    let e=line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    e=e.replace(/"([^"\\]|\\.)*"/g,m=>`<span style="color:#ce9178">${m}</span>`);
    e=e.replace(/(\/\/.*$)/g,m=>`<span style="color:#6a9955">${m}</span>`);
    e=e.replace(/\b(public|static|void|int|double|boolean|String|return|if|else|for|while|new|class|true|false|null|char|long|float)\b/g,m=>`<span style="color:#569cd6">${m}</span>`);
    e=e.replace(/\b(\d+\.?\d*)\b/g,m=>`<span style="color:#b5cea8">${m}</span>`);
    return `<div style="min-height:20px">${e}</div>`;
  }).join("");
}

function startQuiz(){
  codes=EXERCISES.map(e=>e.defaultCode);
  penalties=EXERCISES.map(()=>0);
  results=EXERCISES.map(()=>null);
  feedbacks=EXERCISES.map(()=>null);
  locked=EXERCISES.map(()=>false);
  history=EXERCISES.map(()=>[]);
  timeLeft=TOTAL_TIME;
  cur=0;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    if(timeLeft<=0){clearInterval(timerInterval);renderFinished();}
    updateTimer();
  },1000);
  renderQuiz();
}

function updateTimer(){
  const el=document.getElementById("timerDisplay");
  if(el)el.textContent=fmt(timeLeft);
  const el2=document.getElementById("timerBox");
  if(el2)el2.style.background=timeLeft<600?"#dc2626":timeLeft<1800?"#d97706":"#065f46";
}

function renderQuiz(){
  const ex=EXERCISES[cur];

      <th style="border:1px solid #e5e7eb;padding:6px 12px;text-align:left;font-weight:700;">Prueba</th>

    </tr></thead>

        <div style="background:#fef2f2;padding:14px 16px;"><pre style="margin:0;font-size:12px;color:#7f1d1d;white-space:pre-wrap;line-height:1.7;">${(fb.syntaxErrors||[]).join("\n")}</pre></div>
        <div style="background:#fee2e2;border-top:1px solid #fca5a5;padding:6px 14px;font-size:11px;color:#991b1b;">Penalización: <strong>-${fb.penalty}%</strong> — Intento #${fb.attempt}</div>
      </div>`;
    } else {
      const ok=fb.type==="success";
      const bd=ok?"#86efac":"#fca5a5";
      const bg=ok?"#f0fdf4":"#fef2f2";
      const tc=ok?"#166534":"#991b1b";
      const rows=(fb.testRows||[]).map(r=>`<tr style="background:${r.pass?(ok?"#f0fdf4":"#f8fff8"):"#fff5f5"};">

        <td style="border:1px solid ${bd};padding:4px 8px;font-family:monospace;">${r.expected}</td>
        <td style="border:1px solid ${bd};padding:4px 8px;font-family:monospace;color:${r.pass?"inherit":"#dc2626"};font-weight:${r.pass?"normal":"600"};">${r.got}</td>

          <div style="padding:12px 16px;display:flex;flex-wrap:wrap;gap:6px;">${navBtns}</div>
        </div>
        <div style="background:#fff;border-radius:8px;border:1px solid #e5e7eb;padding:12px 16px;margin-bottom:12px;">
          <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:8px;">Puntaje acumulado</div>
          <div style="font-size:28px;font-weight:800;color:#1e3a8a;">${total.toFixed(2)}<span style="font-size:14px;color:#6b7280;">/6.00</span></div>
          <div style="height:6px;background:#e5e7eb;border-radius:3px;margin-top:8px;"><div style="height:100%;background:${total>=3?"#059669":"#1a56db"};border-radius:3px;width:${(total/6)*100}%;"></div></div>
          <div style="font-size:11px;color:#6b7280;margin-top:4px;">Mínimo para aprobar: 3.00</div>
        </div>
        <div style="background:#fff;border-radius:8px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:12px;">
          <div style="background:#374151;padding:8px 16px;color:#fff;font-size:12px;font-weight:700;">
            Historial — Pregunta ${cur+1} (${history[cur].length} intento(s))
          </div>
          ${histHtml}
        </div>
        <button onclick="finalizeQuiz()" style="background:#059669;color:#fff;border:none;border-radius:6px;padding:9px 0;font-size:12px;font-weight:700;width:100%;">Finalizar revisión</button>
      </div>

      <div>
        <div style="background:#fff;border-radius:8px;border:1px solid #e5e7eb;overflow:hidden;">
          <div style="padding:14px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;background:${headerBg};">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="background:${badgeBg};color:#fff;border-radius:4px;padding:2px 10px;font-size:12px;font-weight:700;">${badgeText}</span>
              <span style="font-size:12px;color:#6b7280;">Se puntúa ${earned!==null?earned.toFixed(2):ex.points.toFixed(2)} sobre ${ex.points.toFixed(2)}</span>
            </div>
            <div style="font-size:12px;color:#6b7280;">
              Penalización: <strong>${ex.penaltySystem} %</strong>
              ${pen>0?`<span style="color:#dc2626;margin-left:8px;">Actual: -${pen}%</span>`:""}
            </div>
          </div>

          <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;font-size:14px;color:#374151;line-height:1.7;">${ex.description}</div>

          <div style="padding:0 20px 12px;border-bottom:1px solid #e5e7eb;">
            <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;">Firma de la función:</div>
            <pre style="background:#f8f9fa;border:1px solid #e5e7eb;border-radius:4px;padding:8px 12px;font-size:12px;color:#1e3a8a;font-family:'Courier New',monospace;">${ex.signature.replace(/</g,"&lt;")}</pre>
          </div>

          <div style="padding:12px 20px;border-bottom:1px solid #e5e7eb;">
            <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;">Por ejemplo:</div>
            ${testsTableHtml}
          </div>

          <div style="padding:12px 20px 0;">
            <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;">
              Respuesta: <span style="font-weight:400;color:#6b7280;">(sistema de penalización: ${ex.penaltySystem} %)</span>
            </div>
            <button onclick="resetCode()" ${locked[cur]?"disabled":""} style="background:#374151;color:#fff;border:none;border-radius:5px;padding:7px 18px;font-size:12px;font-weight:700;margin-bottom:10px;opacity:${locked[cur]?0.5:1};">Reiniciar respuesta</button>
            <div style="border:1px solid #3e3e42;border-radius:6px;overflow:hidden;margin-bottom:12px;background:#1e1e1e;position:relative;">
              <div style="background:#252526;border-bottom:1px solid #3e3e42;padding:5px 14px;font-size:11px;color:#9cdcfe;font-family:monospace;display:flex;justify-content:space-between;">
                <span>Java</span><span style="color:#6b7280;font-size:10px;">${locked[cur]?"🔒 Bloqueado":""}</span>
              </div>
              <div style="display:flex;position:relative;min-height:180px;">
                <div id="lineNums" style="background:#1e1e1e;border-right:1px solid #3e3e42;padding:8px 0;min-width:44px;text-align:right;user-select:none;flex-shrink:0;"></div>
                <div id="highlight" aria-hidden="true" style="position:absolute;left:44px;top:0;right:0;bottom:0;padding:8px 12px;font-size:12px;font-family:'Courier New',monospace;line-height:20px;pointer-events:none;white-space:pre-wrap;word-break:break-all;color:#d4d4d4;z-index:1;"></div>
                <textarea id="codeArea" spellcheck="false" ${locked[cur]?"disabled":""} style="flex:1;border:none;outline:none;padding:8px 12px;font-size:12px;font-family:'Courier New',monospace;line-height:20px;resize:none;min-height:180px;background:transparent;color:transparent;caret-color:#fff;z-index:2;position:relative;white-space:pre;">${codes[cur]}</textarea>
              </div>
            </div>
          </div>

          <div style="padding:0 20px 16px;display:flex;align-items:center;gap:12px;">
            <button id="checkBtn" onclick="handleCheck()" ${locked[cur]||checking?"disabled":""} style="${checkBtnStyle};color:#fff;border:none;border-radius:5px;padding:9px 24px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;">${checkBtnText}</button>
            ${checking?`<span style="font-size:12px;color:#6b7280;">Running Java...</span>`:""}
          </div>

          ${fbHtml}

          <div style="padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;background:#f9fafb;">
            <button onclick="goTo(${Math.max(0,cur-1)})" ${cur===0?"disabled":""} style="background:${cur===0?"#e5e7eb":"#374151"};color:${cur===0?"#9ca3af":"#fff"};border:none;border-radius:5px;padding:7px 18px;font-size:12px;font-weight:700;">← Anterior</button>
            <span style="font-size:13px;color:#6b7280;align-self:center;">Ejercicio ${cur+1} de ${EXERCISES.length}</span>
            <button onclick="goTo(${Math.min(EXERCISES.length-1,cur+1)})" ${cur===EXERCISES.length-1?"disabled":""} style="background:${cur===EXERCISES.length-1?"#e5e7eb":"#1a56db"};color:${cur===EXERCISES.length-1?"#9ca3af":"#fff"};border:none;border-radius:5px;padding:7px 18px;font-size:12px;font-weight:700;">Siguiente →</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  updateEditor();
  document.getElementById("codeArea").addEventListener("input",e=>{
    if(locked[cur])return;
    codes[cur]=e.target.value;
    updateEditor();
  });
}

function updateEditor(){
  const ta=document.getElementById("codeArea");
  if(!ta)return;
  const code=codes[cur];
  const lines=code.split("\n");
  const ln=document.getElementById("lineNums");
  if(ln)ln.innerHTML=lines.map((_,i)=>`<div style="padding:0 10px 0 6px;font-size:12px;color:#858585;line-height:20px;font-family:monospace;">${i+1}</div>`).join("");
  const hl=document.getElementById("highlight");
  if(hl)hl.innerHTML=highlightJava(code);
}

function goTo(i){
  if(i<0||i>=EXERCISES.length)return;
  cur=i;renderQuiz();
}

function resetCode(){
  if(locked[cur])return;
  codes[cur]=EXERCISES[cur].defaultCode;
  feedbacks[cur]=null;
  renderQuiz();
}

async function handleCheck(){
  if(locked[cur]||checking)return;
  checking=true;renderQuiz();
  const code=codes[cur],ex=EXERCISES[cur];
  const attemptN=(history[cur]?.length||0)+1;
  const pi=Math.min(attemptN-1,PENALTY_STEPS.length-1);
  try{
    const ev=await evaluateJavaWithAI(code,ex);
    let newFb;
    if(!ev.compilable){
      penalties[cur]=PENALTY_STEPS[pi];
      newFb={type:"syntax",syntaxErrors:ev.syntaxErrors||[],attempt:attemptN,penalty:PENALTY_STEPS[pi]};
    }else{
      const testRows=ev.tests.map((t,i)=>({call:ex.tests[i].call,expected:ex.tests[i].expectedOutput,got:t.gotOutput??"—",pass:t.pass}));
      const allPass=testRows.every(r=>r.pass);
      if(!allPass)penalties[cur]=PENALTY_STEPS[pi];
      results[cur]={passed:allPass,testRows};
      newFb={type:allPass?"success":"wrong",testRows,logicErrors:ev.logicErrors||[],attempt:attemptN,penalty:allPass?0:PENALTY_STEPS[pi]};
      if(allPass)locked[cur]=true;
    }
    feedbacks[cur]=newFb;
    history[cur]=[...history[cur],{attemptN,code,fb:newFb,timeLeft}];
  }catch{
    feedbacks[cur]={type:"syntax",syntaxErrors:["Error: evaluator unreachable."],attempt:attemptN,penalty:0};
  }
  checking=false;renderQuiz();
}

function finalizeQuiz(){
  if(timerInterval)clearInterval(timerInterval);
  renderFinished();
}

function renderFinished(){
  const total=getTotal();
  const passed=total>=3;
  document.getElementById("app").innerHTML=`
  <div style="font-family:'Trebuchet MS',Georgia,serif;min-height:100vh;background:#f3f4f6;display:flex;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.12);padding:40px 52px;max-width:640px;text-align:center;">
      <div style="font-size:56px;margin-bottom:12px;">${passed?"🎉":"😔"}</div>
      <h1 style="font-size:26px;font-weight:700;color:${passed?"#059669":"#dc2626"};margin-bottom:4px;">${passed?"¡Aprobado!":"No Aprobado"}</h1>
      <p style="color:#6b7280;margin-bottom:20px;font-size:13px;">${QUIZ_TITLE}</p>
      <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:20px;margin-bottom:20px;">
        <div style="font-size:36px;font-weight:800;color:${passed?"#059669":"#dc2626"};">${total.toFixed(2)}<span style="font-size:18px;color:#6b7280;">/6.00</span></div>
        <div style="color:#6b7280;font-size:13px;margin-top:4px;">${(total/6*100).toFixed(2)} / 100,00</div>
      </div>
      <div style="display:grid;gap:6px;margin-bottom:20px;text-align:left;">
        ${EXERCISES.map((e,i)=>`
        <div style="background:${results[i]?.passed?"#f0fdf4":"#fef2f2"};border:1px solid ${results[i]?.passed?"#bbf7d0":"#fecaca"};border-radius:6px;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;font-weight:600;">${e.title} <span style="color:#6b7280;font-weight:400;font-size:12px;">(${history[i].length} intento(s))</span></span>
          <span style="font-size:13px;font-weight:700;color:${results[i]?.passed?"#059669":"#dc2626"};">${results[i]?.passed?`+${(e.points*(1-penalties[i]/100)).toFixed(2)} pts`:"0,00"}</span>
        </div>`).join("")}
      </div>
      <button onclick="startQuiz()" style="background:#1a56db;color:#fff;border:none;border-radius:6px;padding:10px 24px;font-weight:700;font-size:13px;">Nuevo intento</button>
    </div>
  </div>`;
}

renderStart();
</script>
</body>
</html>
